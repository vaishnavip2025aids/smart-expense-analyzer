<!DOCTYPE html>
<html>

<head>
    <title>Register - Smart Expense Analyzer</title>
    <link rel="stylesheet" href="/static/style.css">

    <style>
        /* Center layout */
        .register-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
        }

        /* Glass box */
        .register-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .register-box h2 {
            margin-bottom: 20px;
        }

        /* Inputs */
        .register-box input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        /* Button */
        .register-box button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #3498db;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .register-box button:hover {
            background: #2980b9;
            transform: scale(1.05);
        }

        /* Link */
        .register-box a {
            display: block;
            margin-top: 15px;
            color: #fff;
            text-decoration: none;
        }

        .register-box a:hover {
            color: #00c9a7;
        }

        /* Title */
        .app-title {
            text-align: center;
            margin-top: 20px;
            font-size: 28px;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="app-title">📝 Create Your Account</div>

    <div class="register-container">
        <div class="register-box">
            <h2>Register</h2>

            <form method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>

                <!-- Optional confirm password -->
                <input type="password" name="confirm" placeholder="Confirm Password" required>

                <button type="submit">Register</button>
            </form>

            <a href="/">Already have an account? Login</a>
        </div>
    </div>

</body>

</html>
